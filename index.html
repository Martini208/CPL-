<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>F1 Logos</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff;
      color: #000;
      margin: 0;
      padding: 0;
    }

    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      align-items: center;
      background: #c40000;
      padding: 10px 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      z-index: 1000;
    }

    .top-bar img {
      width: 70px;
      margin-right: 20px;
    }

    .nav {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .nav a {
      background: #ff0000;
      color: white;
      padding: 10px 18px;
      border-radius: 8px;
      font-weight: bold;
      text-decoration: none;
      font-size: 18px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .nav a:hover {
      background: #b30000;
    }

    .spacer {
      height: 120px;
    }

    .section-title {
      font-size: 32px;
      font-weight: bold;
      margin: 40px 0 20px;
      text-align: center;
    }

    /* ---------------- LOGO GRID ---------------- */
    .logo-grid.logo-section {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 40px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .logo-grid.logo-section img {
      width: 180px;
      height: 180px;
      object-fit: contain;
      background: #fff;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    /* ---------------- BOLID GRID ---------------- */
    .logo-grid.bolid-section {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
      gap: 50px;
      max-width: 1600px;
      margin: 0 auto;
      padding: 20px;
    }

    .logo-grid.bolid-section img {
      width: 100%;
      max-width: 450px;
      border-radius: 10px;
      background: #f2f2f2;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

  </style>
</head>
