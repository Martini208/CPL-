<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>CPL – Logos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      text-align: center;
      padding: 40px;
    }
    h1 {
      margin-bottom: 30px;
    }
    .logo-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }
    .logo-grid img {
      width: 150px;
      border-radius: 10px;
      background: #222;
      padding: 10px;
    }
  </style>
</head>
<body>
  <h1>CPL – Logos</h1>

  <div class="logo-grid">
    <img src="mercedes.png" alt="Mercedes Logo">
    <img src="ferrari.png" alt="Ferrari Logo">
    <img src="bmw.png" alt="BMW Logo">
    <img src="audi.png" alt="Audi Logo">
  </div>

</body>
</html>
