<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>CPL – F1 Logos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      text-align: center;
      padding: 40px;
    }

    h1 {
      margin-bottom: 40px;
    }

    .logo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 50px; /* Abstand zwischen den Logos */
      max-width: 1200px;
      margin: 0 auto;
    }

    .logo-grid img {
      width: 150px;
      border-radius: 10px;
      background: #222;
      padding: 20px; /* Innenabstand */
    }
  </style>
</head>
<body>
  <h1>CPL – F1 Logos</h1>

  <div class="logo-grid">

    <img src="Alpine.png" alt="Alpine">
    <img src="Aston Martin.jpg" alt="Aston Martin">
    <img src="Audi.jpg" alt="Audi">
    <img src="Logo_Williams_F1.png" alt="Williams">
    <img src="Mclaren.jpg" alt="McLaren">
    <img src="Mercedes.jpg" alt="Mercedes">
    <img src="Red-Bull-Logo.png" alt="Red Bull">
    <img src="Scuderia_Ferrari_Logo.svg.png" alt="Ferrari">
    <img src="Visa_cash.png" alt="Visa Cash">
    <img src="cadillac-blk-logo.png" alt="Cadillac">
    <img src="haas.png" alt="Haas">

  </div>

</body>
</html>
