<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>F1 Logos</title>

  <style>
/* ---------------- GLOBAL APPLE STYLE ---------------- */
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  background: #fafafa;
  color: #111;
  margin: 0;
  padding: 0;
}

/* ---------------- TOP BAR (APPLE STYLE RED, MORE GLASS) ---------------- */
.top-bar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  display: flex;
  align-items: center;

  background: rgba(196, 0, 0, 0.55);
  backdrop-filter: blur(30px) saturate(180%);

  padding: 16px 45px;
  box-shadow: 0 12px 35px rgba(0,0,0,0.25);
  z-index: 1000;
}

.top-bar img {
  width: 70px;
  margin-right: 35px;
}

/* neues Bild rechts neben CPL */
.top-bar .seasonpack {
  width: 220px;
  margin-left: 20px;
}

/* Navigation im Apple‑Look aber rot */
.nav {
  display: flex;
  gap: 20px;
}

.nav a {
  color: #fff;
  padding: 10px 18px;
  border-radius: 12px;
  font-weight: 600;
  text-decoration: none;
  font-size: 17px;
  transition: 0.25s;
}

.nav a:hover {
  background: rgba(255,255,255,0.25);
}

/* ---------------- SPACER ---------------- */
.spacer {
  height: 140px;
}

/* ---------------- SECTION TITLES ---------------- */
.section-title {
  font-size: 40px;
  font-weight: 700;
  margin: 60px 0 30px;
  text-align: center;
  letter-spacing: -0.5px;
  color: #111;
}

/* ---------------- GRID (APPLE STYLE) ---------------- */
.logo-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 50px;
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px 40px;
}

/* ---------------- IMAGE STYLE ---------------- */
.logo-grid img {
  width: 100%;
  height: 200px;
  object-fit: contain;
  background: #fff;
  padding: 25px;
  border-radius: 22px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}

/* ---------------- APPLE HOVER EFFECT ---------------- */
.logo-grid img:hover {
  transform: scale(1.05);
  box-shadow: 0 20px 40px rgba(0,0,0,0.12);
}

/* ---------------- BOLID SECTION (bigger images + fewer per row) ---------------- */
.logo-grid.bolid-section {
  grid-template-columns: repeat(auto-fit, minmax(600px, 1fr)); /* nur 1–2 pro Reihe */
}

.logo-grid.bolid-section img {
  width: 100%;
  max-width: 650px;   /* deutlich größer */
  height: auto;
  padding: 30px;
  border-radius: 25px;
  box-shadow: 0 12px 35px rgba(0,0,0,0.12);
}
  </style>
</head>
